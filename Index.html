    <div class="counter">
        <div class="counter-label">Total registrado</div>
        <div class="counter-value" id="totalCount">0</div>
    </div>

    <div class="status" id="status"></div>

    <div class="button-container">
        <button class="register-btn" id="registerBtn">📸 REGISTRAR</button>

    <div class="history" id="historyContainer" style="display: none;">
        <div class="history-title">Últimos registros</div>
        <div id="historyList"></div>

<input type="file" id="cameraInput" class="hidden-camera" accept="image/*" capture="environment">

<script>
    // Configuración
    const CONFIG = {
        github_user: 'chuledp',
        github_repo: 'Andreani-contahoras',
        github_token: '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',
        folder: 'registros'
    };

    // Variables globales
    let registros = [];
    const registerBtn = document.getElementById('registerBtn');
    const statusDiv = document.getElementById('status');
    const cameraInput = document.getElementById('cameraInput');
    const totalCountDiv = document.getElementById('totalCount');
    const historyList = document.getElementById('historyList');
    const historyContainer = document.getElementById('historyContainer');
    const clearBtn = document.getElementById('clearBtn');

    // Cargar datos al iniciar
    function loadRegistros() {
        const stored = localStorage.getItem('andreani-registros');
        if (stored) {
            registros = JSON.parse(stored);
        }
        actualizarUI();
    }

    // Guardar datos localmente
    function saveRegistros() {
        localStorage.setItem('andreani-registros', JSON.stringify(registros));
    }

    // Actualizar interfaz
    function actualizarUI() {
        totalCountDiv.textContent = registros.length;
        
        if (registros.length > 0) {
            historyContainer.style.display = 'block';
            historyList.innerHTML = registros
                .slice()
                .reverse()
                .slice(0, 5)
                .map((r, idx) => `
                    <div class="history-item">
                        <div>
                            <div class="history-time">${r.hora}</div>
                            <div class="history-date">${r.fecha}</div>
                        </div>
                        <div class="history-status">${(registros.length - idx) % 2 === 1 ? 'ENTRADA' : 'SALIDA'}</div>
                    </div>
                `).join('');
        } else {
            historyContainer.style.display = 'none';
        }
    }

    // Capturar foto
    function capturarFoto() {
        cameraInput.click();
    }

    // Procesar foto
    cameraInput.addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        setStatus('Procesando foto...', 'loading');
        registerBtn.disabled = true;

        try {
            // Comprimir foto
            const compressedImage = await comprimirFoto(file);
            
            // Crear registro
            const ahora = new Date();
            const fecha = ahora.toLocaleDateString('es-ES');
            const hora = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            
            const registro = {
                fecha: fecha,
                hora: hora,
                timestamp: ahora.getTime(),
                conFoto: true
            };

            // Guardar foto en GitHub
            const nombreArchivo = `${ahora.getTime()}.jpg`;
            await guardarEnGithub(compressedImage, nombreArchivo);

            // Guardar registro localmente
            registros.push(registro);
            saveRegistros();
            actualizarUI();

            setStatus('✅ Registro guardado', 'success');
            
            // Limpiar input
            cameraInput.value = '';
            
            setTimeout(() => {
                setStatus('');
            }, 2000);

        } catch (error) {
            console.error('Error:', error);
            setStatus('❌ Error: ' + error.message, 'error');
        } finally {
            registerBtn.disabled = false;
        }
    });

    // Comprimir foto
    function comprimirFoto(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxWidth = 640;
                    const maxHeight = 480;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob(
                        (blob) => resolve(blob),
                        'image/jpeg',
                        0.6
                    );
                };
                img.src = e.target.result;
            };
            reader.onerror = () => reject(new Error('Error al leer archivo'));
            reader.readAsDataURL(file);
        });
    }

    // Guardar en GitHub
    async function guardarEnGithub(blob, nombreArchivo) {
        const reader = new FileReader();
        
        return new Promise((resolve, reject) => {
            reader.onload = async () => {
                try {
                    const base64 = reader.result.split(',')[1];
                    const ruta = `${CONFIG.folder}/${nombreArchivo}`;

                    const response = await fetch(
                        `https://api.github.com/repos/${CONFIG.github_user}/${CONFIG.github_repo}/contents/${ruta}`,
                        {
                            method: 'PUT',
                            headers: {
                                'Authorization': `token ${CONFIG.github_token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `Registro de hora: ${new Date().toLocaleString('es-ES')}`,
                                content: base64
                            })
                        }
                    );

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.message || 'Error al guardar en GitHub');
                    }

                    resolve();
                } catch (error) {
                    reject(error);
                }
            };
            
            reader.onerror = () => reject(new Error('Error al procesar imagen'));
            reader.readAsDataURL(blob);
        });
    }

    // Mostrar estado
    function setStatus(message, type) {
        statusDiv.textContent = message;
        statusDiv.className = 'status';
        if (type) statusDiv.classList.add(type);
    }

    // Botón registrar
    registerBtn.addEventListener('click', capturarFoto);

    // Limpiar datos
    clearBtn.addEventListener('click', () => {
        if (confirm('¿Estás seguro de que quieres borrar todos los registros locales?')) {
            registros = [];
            saveRegistros();
            actualizarUI();
            setStatus('✅ Datos borrados', 'success');
            setTimeout(() => setStatus(''), 2000);
        }
    });

    // Inicializar
    loadRegistros();
</script>
